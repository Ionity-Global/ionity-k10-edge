<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="icon" href="/web/favicon.ico" />
<title>Ionity · Home Assistant</title>
<style>
  :root{
    --bg:#050b14; --bg2:#0a1622; --panel:#0e1c2b; --line:#17324a;
    --cyan:#00d2ff; --ink:#eaf6ff; --sub:#7fa6c9; --accent:#e94560;
    --ok:#26de81; --warn:#f7b731;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:radial-gradient(1200px 800px at 50% -10%,#0b2036 0%,var(--bg) 60%);
    color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;overflow:hidden}
  header{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--line);
    background:rgba(5,11,20,.6);backdrop-filter:blur(8px);position:relative;z-index:5}
  header img{height:30px}
  header .t{font-weight:700;letter-spacing:.5px}
  header .t small{color:var(--sub);font-weight:400;margin-left:8px}
  header .grow{flex:1}
  .pill{font-size:12px;padding:4px 10px;border-radius:999px;border:1px solid var(--line);color:var(--sub)}
  .pill.on{color:var(--ok);border-color:#1c5a3c}
  .pill.warn{color:var(--warn);border-color:#5a4a1c}
  main{display:grid;grid-template-columns:1.15fr .85fr;height:calc(100% - 60px)}
  @media(max-width:820px){main{grid-template-columns:1fr;grid-template-rows:1fr auto}}
  .stage{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
  canvas#orb{width:min(70vh,560px);height:min(70vh,560px);max-width:92%}
  .state{position:absolute;top:18px;left:50%;transform:translateX(-50%);text-transform:uppercase;
    letter-spacing:3px;font-size:13px;color:var(--sub)}
  .caption{position:absolute;bottom:26px;left:6%;right:6%;text-align:center;min-height:2.2em}
  .caption b{color:var(--cyan)}
  .caption .u{color:var(--sub);font-size:13px}
  .side{border-left:1px solid var(--line);display:flex;flex-direction:column;min-height:0;background:rgba(10,22,34,.35)}
  .log{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
  .msg{max-width:86%;padding:9px 13px;border-radius:14px;line-height:1.35;font-size:14px;white-space:pre-wrap;word-wrap:break-word}
  .msg.user{align-self:flex-end;background:#123049;border:1px solid var(--line)}
  .msg.ai{align-self:flex-start;background:#0c2136;border:1px solid #14405c}
  .msg .who{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--sub);margin-bottom:3px}
  .controls{border-top:1px solid var(--line);padding:12px;display:flex;gap:8px;align-items:center}
  .mic{width:52px;height:52px;border-radius:50%;border:1px solid var(--line);background:#0c2136;color:var(--cyan);
    font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 auto;transition:.15s}
  .mic.rec{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 0 20px var(--accent)}
  .controls input{flex:1;background:#0a1826;border:1px solid var(--line);color:var(--ink);padding:11px 13px;border-radius:10px;font-size:14px}
  .controls button.send{background:var(--cyan);color:#04141c;border:none;padding:0 16px;height:44px;border-radius:10px;font-weight:700;cursor:pointer}
  footer{position:absolute;bottom:6px;left:0;right:0;text-align:center;font-size:11px;color:#456;z-index:5;pointer-events:none}
  .hint{position:absolute;top:44px;left:50%;transform:translateX(-50%);font-size:11px;color:#456}
</style>
</head>
<body>
<header>
  <img src="/web/ionity-logo.svg" alt="Ionity" onerror="this.style.display='none'"/>
  <div class="t">IONITY <small>Home Assistant · Edge</small></div>
  <div class="grow"></div>
  <span class="pill" id="pBrain">brain …</span>
  <span class="pill" id="pStt">stt …</span>
  <span class="pill" id="pBridge">claude …</span>
</header>

<main>
  <section class="stage">
    <div class="state" id="stateLabel">IDLE</div>
    <div class="hint" id="hint">tap the mic and talk — or type below · say “Ionity …”</div>
    <canvas id="orb" width="560" height="560"></canvas>
    <div class="caption" id="caption"></div>
    <footer>Building Tomorrow, Today. · © 2018–2026 Ionity (Pty) Ltd · Johan Wilhelm van Antwerp · Policy 986 AED · CC BY-SA 4.0</footer>
  </section>

  <aside class="side">
    <div class="log" id="log"></div>
    <div class="controls">
      <button class="mic" id="mic" title="Push to talk">🎙</button>
      <input id="text" placeholder="Ask Ionity…" autocomplete="off"/>
      <button class="send" id="send">Send</button>
    </div>
  </aside>
</main>

<script>
const BASE = location.origin;
const STATE_LABELS = {sleeping:"SLEEPING",idle:"IDLE",listening:"LISTENING",thinking:"THINKING",speaking:"SPEAKING"};

// ---------- orb animation (native canvas — the "amazing graphics") ----------
const cv = document.getElementById('orb'), ctx = cv.getContext('2d');
let target = {color:[0,210,255], level:0, state:'idle'};
let cur = {color:[14,90,134], level:0};
let micLevel = 0, phase = 0;
function hex2rgb(h){h=(h||'').replace('#','');return [parseInt(h.slice(0,2),16)||0,parseInt(h.slice(2,4),16)||0,parseInt(h.slice(4,6),16)||0];}
function lerp(a,b,t){return a+(b-a)*t;}
function draw(){
  const W=cv.width,H=cv.height,cx=W/2,cy=H/2;
  cur.color=cur.color.map((c,i)=>lerp(c,target.color[i],0.08));
  const drive = Math.max(target.level, micLevel);
  cur.level=lerp(cur.level,drive,0.15);
  phase += (target.state==='sleeping'?0.02:0.06);
  const breathe = 0.5+0.5*Math.sin(phase) * (target.state==='sleeping'?0.3:1);
  const [r,g,b]=cur.color.map(x=>Math.round(x));
  const base = W*0.16 + cur.level*W*0.14 + breathe*W*0.035;
  ctx.clearRect(0,0,W,H);
  for(const [rad,a] of [[base*2.6,0.06],[base*1.9,0.12],[base*1.35,0.28]]){
    const grd=ctx.createRadialGradient(cx,cy,base*0.2,cx,cy,rad);
    grd.addColorStop(0,`rgba(${r},${g},${b},${a})`);grd.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=grd;ctx.beginPath();ctx.arc(cx,cy,rad,0,7);ctx.fill();
  }
  if(target.state==='listening'){
    ctx.strokeStyle=`rgba(${r},${g},${b},0.5)`;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(cx,cy,base*(1.35+cur.level*0.7),0,7);ctx.stroke();
  }
  if(target.state==='thinking'){
    const ox=Math.cos(phase*1.8)*base*0.5, oy=Math.sin(phase*1.8)*base*0.5;
    const gg=ctx.createRadialGradient(cx+ox,cy+oy,0,cx+ox,cy+oy,base*0.6);
    gg.addColorStop(0,`rgba(${r},${g},${b},0.8)`);gg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gg;ctx.beginPath();ctx.arc(cx+ox,cy+oy,base*0.6,0,7);ctx.fill();
  }
  const core=ctx.createRadialGradient(cx-base*0.3,cy-base*0.3,base*0.1,cx,cy,base);
  core.addColorStop(0,`rgb(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)})`);
  core.addColorStop(1,`rgb(${r},${g},${b})`);
  ctx.fillStyle=core;ctx.beginPath();ctx.arc(cx,cy,base,0,7);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.85)';ctx.beginPath();ctx.arc(cx-base*0.32,cy-base*0.34,base*0.16,0,7);ctx.fill();
  micLevel*=0.9;
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

// ---------- live state poll ----------
let lastN=0;
async function poll(){
  try{
    const d=await (await fetch(BASE+'/api/assistant')).json();
    target.color=hex2rgb(d.color); target.level=d.level||0; target.state=d.state;
    document.getElementById('stateLabel').textContent=STATE_LABELS[d.state]||d.state;
    const cap=document.getElementById('caption');
    cap.innerHTML = d.reply ? `<b>${esc(d.reply)}</b>` + (d.user?`<div class="u">you: ${esc(d.user)}</div>`:'') : '';
    if(d.transcript && d.transcript.length!==lastN){ renderLog(d.transcript); lastN=d.transcript.length; }
  }catch(e){}
}
setInterval(poll,600); poll();

async function status(){
  try{
    const s=await (await fetch(BASE+'/api/status')).json();
    const m=s.brain?.models||{}, br=s.brain?.bridge||{};
    setPill('pStt', m.stt, m.stt?'stt ready':'stt off');
    setPill('pBridge', br.enabled, br.enabled?'claude bridge':'claude off');
    setPill('pBrain', m.local_llm, m.local_llm?'gemma4:e2b':'brain: cache');
  }catch(e){}
}
setInterval(status,4000); status();
function setPill(id,on,txt){const el=document.getElementById(id);el.textContent=txt;el.className='pill'+(on?' on':' warn');}
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function renderLog(tr){
  const log=document.getElementById('log');log.innerHTML='';
  for(const m of tr){const d=document.createElement('div');d.className='msg '+(m.role==='user'?'user':'ai');
    d.innerHTML=`<div class="who">${m.role==='user'?'You':'Ionity'}</div>${esc(m.text)}`;log.appendChild(d);}
  log.scrollTop=log.scrollHeight;
}

// ---------- speak replies (server WAV if present, else browser TTS) ----------
let lastSpoken='';
async function maybeSpeak(){
  try{
    const d=await (await fetch(BASE+'/api/say')).json();
    if(d.text && d.text!==lastSpoken){
      lastSpoken=d.text;
      const w=await fetch(BASE+'/api/say.wav');
      if(w.ok){const a=new Audio(URL.createObjectURL(await w.blob()));a.play().catch(()=>{});}
      else if(window.speechSynthesis){const u=new SpeechSynthesisUtterance(d.text);u.rate=1.02;speechSynthesis.speak(u);}
    }
  }catch(e){}
}
setInterval(maybeSpeak,900);

// ---------- text input ----------
document.getElementById('send').onclick=sendText;
document.getElementById('text').addEventListener('keydown',e=>{if(e.key==='Enter')sendText();});
async function sendText(){
  const el=document.getElementById('text');const t=el.value.trim();if(!t)return;el.value='';
  await fetch(BASE+'/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t})});
  poll();
}

// ---------- push-to-talk (record mic -> /api/voice -> server whisper) ----------
const micBtn=document.getElementById('mic');
let rec=null, chunks=[], audioCtx=null, analyser=null, micStream=null, reacting=false;
micBtn.onclick=async()=>{
  if(rec && rec.state==='recording'){ rec.stop(); return; }
  try{
    micStream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
    const src=audioCtx.createMediaStreamSource(micStream);analyser=audioCtx.createAnalyser();analyser.fftSize=512;src.connect(analyser);
    reacting=true; reactLoop();
    chunks=[]; rec=new MediaRecorder(micStream);
    rec.ondataavailable=e=>chunks.push(e.data);
    rec.onstop=async()=>{
      reacting=false; micStream.getTracks().forEach(t=>t.stop());
      micBtn.classList.remove('rec');
      const blob=new Blob(chunks,{type:rec.mimeType||'audio/webm'});
      const fd=new FormData();fd.append('file',blob,'utter.webm');
      micBtn.textContent='…';
      try{ await fetch(BASE+'/api/voice',{method:'POST',body:fd}); }catch(e){}
      micBtn.textContent='🎙'; poll();
    };
    rec.start(); micBtn.classList.add('rec');
  }catch(e){ alert('Mic unavailable: '+e.message); }
};
function reactLoop(){
  if(!reacting||!analyser)return;
  const buf=new Uint8Array(analyser.frequencyBinCount);analyser.getByteTimeDomainData(buf);
  let s=0;for(const v of buf){const x=(v-128)/128;s+=x*x;}
  micLevel=Math.min(1,Math.sqrt(s/buf.length)*3.2);
  fetch(BASE+'/api/level',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({level:micLevel})}).catch(()=>{});
  requestAnimationFrame(reactLoop);
}
</script>
</body>
</html>
