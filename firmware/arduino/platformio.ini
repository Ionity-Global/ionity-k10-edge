; IonityEdge · K10 — PlatformIO project
; Board: DFRobot UNIHIKER K10 (ESP32-S3)
; © Ionity (Pty) Ltd · Policy 986 AED · CC BY-SA 4.0
;
; NOTE: The K10 uses the ESP32-S3. The DFRobot "UNIHIKER K10" board-support
; library provides screen/camera/mic/sensor drivers and is best added via the
; Arduino IDE Library Manager or DFRobot's GitHub. Add it to lib_deps or drop it
; in firmware/arduino/lib/ once you have it. The networking/telemetry layer below
; builds on stock, widely-available libraries so the core is solid regardless.

[platformio]
default_envs = unihiker_k10

[env:unihiker_k10]
platform = espressif32
board = esp32-s3-devkitc-1     ; closest generic S3 target; override if a K10 board def is installed
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = partitions.csv
board_upload.flash_size = 16MB
board_build.flash_size = 16MB

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DIONITY_FW_VERSION=\"0.1.0\"

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.4
    links2004/WebSockets @ ^2.4.1
    ; DFRobot_UNIHIKERK10    ; <-- add the DFRobot K10 BSP here (screen/camera/mic/sensors)

; Uncomment to embed the LittleFS image (Ionity logo etc.) at flash time:
; board_build.embed_files = data/logo.png
